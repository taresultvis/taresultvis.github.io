# GitHub Pages를 통해 정적 콘텐츠를 배포하는 워크플로우
name: Deploy Vite Project to Pages

on:
  # 'main' 브랜치로 푸시될 때마다 이 워크플로우를 실행합니다.
  push:
    branches: ['main']

  # GitHub Actions 탭에서 수동으로 실행할 수도 있습니다.
  workflow_dispatch:

# 워크플로우 실행에 필요한 권한을 설정합니다.
permissions:
  contents: read          # 저장소 콘텐츠를 읽을 권한
  pages: write           # GitHub Pages에 배포할 권한
  id-token: write        # OpenID Connect 인증을 위한 토큰 쓰기 권한

# 동시성 설정: 여러 커밋이 연달아 푸시될 때 이전 빌드는 취소하고 마지막 빌드만 진행합니다.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 배포 작업을 정의합니다.
  deploy:
    # 배포 환경을 'github-pages'로 설정합니다.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 배포 후 결과 URL을 출력합니다.
    
    # 작업은 최신 Ubuntu 환경에서 실행됩니다.
    runs-on: ubuntu-latest
    
    steps:
      # 1. 저장소 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 환경 설정 (Vite 빌드를 위해 필요)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/* # 안정적인 최신(LTS) 버전을 사용합니다.
          cache: 'npm'              # npm 의존성 캐싱으로 설치 속도를 높입니다.

      # 3. 프로젝트 의존성 설치
      - name: Install dependencies
        run: npm ci                 # package-lock.json을 기반으로 정확히 설치합니다.

      # 4. 프로젝트 빌드
      - name: Build
        run: npm run build          # 'npm run build' 스크립트를 실행하여 'dist' 폴더를 생성합니다.

      # 5. GitHub Pages 설정
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. 빌드 결과물(Artifact) 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # './dist' 폴더의 내용을 업로드합니다. Vite의 기본 빌드 출력 폴더입니다.
          path: './dist'

      # 7. GitHub Pages에 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
